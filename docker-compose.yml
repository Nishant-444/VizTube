version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viztube-gateway
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - ai-worker
    restart: unless-stopped

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: viztube-ai-worker
    ports:
      - '8000:8000'
    env_file:
      - ./ai-worker/.env
    restart: unless-stopped
